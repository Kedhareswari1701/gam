<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaming Website</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans overflow-x-hidden">

  <!-- Navbar -->
  <header class="fixed top-0 left-0 w-full bg-black/70 backdrop-blur-md border-b border-gray-800 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-3xl font-extrabold text-cyan-400 tracking-widest">
        GAMEZONE
      </h1>

      <nav class="hidden md:flex gap-8 text-lg font-medium">
        <a href="#home" class="hover:text-cyan-400 transition">Home</a>
        <a href="#games" class="hover:text-cyan-400 transition">Games</a>
        <a href="#tournaments" class="hover:text-cyan-400 transition">Tournaments</a>
        <a href="#contact" class="hover:text-cyan-400 transition">Contact</a>
      </nav>

      <!-- <button class="bg-cyan-500 hover:bg-cyan-400 text-black px-5 py-2 rounded-full font-bold transition">
        Play Now
      </button> -->
    </div>
  </header>

  <!-- Hero Section -->
  <section
    id="home"
    class="relative h-screen bg-cover bg-center flex items-center"
    style="background-image: url('https://images.unsplash.com/photo-1542751110-97427bbecf20?auto=format&fit=crop&w=1600&q=80');"
  >
    <div class="absolute inset-0 bg-black/70"></div>

    <div class="relative z-10 max-w-7xl mx-auto px-6">
      <div class="max-w-2xl">
        <p class="uppercase tracking-[6px] text-cyan-400 mb-4 font-semibold">
          Future Of Gaming
        </p>

        <h2 class="text-6xl md:text-7xl font-extrabold leading-tight mb-6">
          Enter The
          <span class="text-cyan-400"> Battle Arena</span>
        </h2>

        <p class="text-lg text-gray-300 leading-8 mb-8">
          Experience next-level graphics, multiplayer action, and immersive gameplay.
        </p>

        <div class="flex flex-wrap gap-4">
          <button class="bg-cyan-500 hover:bg-cyan-400 text-black px-8 py-4 rounded-full font-bold text-lg transition">
            Explore Games
          </button>

          <button class="border border-cyan-400 hover:bg-cyan-400 hover:text-black px-8 py-4 rounded-full font-bold text-lg transition">
            Watch Trailer
          </button>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
